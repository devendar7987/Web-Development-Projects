<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
</head>
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<style>
    body{
    margin: 0px;
    padding: 0px;
    background-image: url('bg6.jpg');
    background-repeat: no-repeat;
    background-size: 1300px 600px;
    }
    .container{
        align-items: center;
        justify-content: center;
        display: flex;
        height:100vh;
        width: 100%;
      
    }
    .box{
        background-color:white;
        border-radius: 8px;
        padding: 40px;
    }
    h1{
      text-align: center;
    text-decoration: underline;
    }
    form{
        margin-bottom: 30px;
    }
    .email
    {
        height: 45px;
        width: 100%;
        margin-bottom: 20px;
    }
    .email input{
        height: 80%;
        width: 100%;
    }
    .email input{
        height: 80%;
        width: 100%;
    }
    .password
    {
        height: 45px;
        width: 100%;
      
    }
    .password input{
        height: 80%;
        width: 100%;
    }
    .fp
    {
        margin-top: 10px;
        text-align: center;
    }
    .fp a{
        text-decoration: none;
    }
    .fp a:hover{
        text-decoration: underline;
    }
    .b button
    {
        height: 40px;
        width: 300px;
        margin-top: 10px;
        border: none;
        font-size: 15px;
        font-weight: 200px;
        margin-bottom: 10px;
        background-color: #0171d3;
        border-radius: 4px;
        cursor: pointer;
     }
     .b button span
     {
        color: white;
     }
     .signup span
     {
        font-size: 16px;
        
     }
     .signup
     {
        text-align: center;
     }
     .signup a{
        text-decoration: none;
    }
    .signup a:hover{
        text-decoration: underline;
    }
    .line
    {
        height: 1px;
        position: relative;
        background-color: #d4d4d4;
        width: 100%;
        margin-top: -15px;
    }
    .line::before{
        content: 'Or';
        position: absolute;
        left: 50%;
        transform: translate(-50%,-50%);
        background-color: white;
        padding: 0 15px;

    }
    .icon1 button
    {
        height: 40px;
        width: 300px;
        margin-top: 10px;
        border: none;
        font-size: 15px;
        font-weight: 200px;
        margin-bottom: 10px;
        background-color: #4267B2;
        border-radius: 4px;
        cursor: pointer;
     }
     .icon1 a button i
     {
        color: white;
        position: absolute;
        left: 480px;
        transform: translate(-50%);
     }
     .icon1 span
     {
        color: white;
     }
     .icon2 button
    {
        height: 40px;
        width: 300px;
        margin-top: 10px;
        border: none;
        font-size: 15px;
        font-weight: 200px;
        margin-bottom: 10px;
       
        border-radius: 4px;
        cursor: pointer;
     }
     .icon2 a button img
     {
        
        position: absolute;
        left: 480px;
        transform: translate(-50%);
     }


</style>
<body>
    <div class="container">
        <div class="box">
    <form>
        <h1>Login</h1>
        <div class="email">
            <input type="email" name="email" placeholder="Email">
        </div>
        <div class="password">
            <input type="password" name="password" placeholder="Password">
        </div>
        <div class="fp">
            <a href="#">Forgot password?</a>
        </div>
        <div class="b">
            <button type="submit"><span>Login</span></button>
        </div>
        <div class="signup">
            <span>Already have an account?<a href="signup.html">Signup</a></span>
        </div>
    </form>    
        <div class="line"></div>
        <div class="icon1">
            <a href="https://www.facebook.com/login.php"><button><i class='bx bxl-facebook-circle' ></i>
           <span> Login with Facebook</span></button></a>
        </div>
        <div class="icon2">
            <a href="https://accounts.google.com/"><button><img src="g1.png" height="20px" width="20px">
                Login with Google</button></a>
        </div>
</div>
</div>   
</body>
</html>
